<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>EPUB Reader</title>
  <link rel="stylesheet" href="popup.css">

</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-icon">📖</div>
      <div>
        <h1>EPUB Reader</h1>
        <p>精美电子书阅读器</p>
      </div>
    </div>

    <div class="action-buttons">
      <button class="action-btn primary" id="open-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        打开文件
      </button>
      <button class="action-btn secondary" id="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        书架管理
      </button>
    </div>

    <input type="file" id="file-input" accept=".epub">

    <div class="divider"></div>

    <div class="recent-section">
      <h2>最近阅读</h2>
      <div class="recent-list" id="recent-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">📚</div>
          <div>暂无阅读记录</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../utils/db-gateway.js?v=8"></script>
  <script src="../utils/utils.js?v=8"></script>
  <script src="../utils/storage.js?v=8"></script>
  <script src="popup.js?v=8"></script>
</body>
</html>
