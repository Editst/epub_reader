<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPUB Reader</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 200px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      overflow: hidden;
    }

    .popup-container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #e94560, #c23152);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    .header p {
      font-size: 11px;
      color: #8892b0;
      margin-top: 2px;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      flex: 1;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #e94560, #c23152);
      color: white;
    }

    .action-btn.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
    }

    .action-btn.secondary {
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
    }

    .action-btn.secondary:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-1px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    .action-btn svg {
      width: 16px;
      height: 16px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 16px 0;
    }

    .recent-section h2 {
      font-size: 12px;
      font-weight: 500;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .recent-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .recent-list::-webkit-scrollbar {
      width: 4px;
    }

    .recent-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
    }

    .recent-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .recent-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .recent-item-icon {
      width: 40px;
      height: 56px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .recent-item-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .recent-item-info {
      flex: 1;
      min-width: 0;
    }

    .recent-item-title {
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .recent-item-date {
      font-size: 11px;
      color: #8892b0;
    }

    .recent-item-progress {
      font-size: 11px;
      color: #e94560;
      font-weight: 600;
    }

    .recent-item-remove {
      opacity: 0;
      width: 20px;
      height: 20px;
      border: none;
      background: rgba(255,255,255,0.1);
      border-radius: 50%;
      color: #8892b0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .recent-item:hover .recent-item-remove {
      opacity: 1;
    }

    .recent-item-remove:hover {
      background: rgba(233, 69, 96, 0.3);
      color: #e94560;
    }

    .empty-state {
      text-align: center;
      padding: 16px 0;
      color: #6b7280;
      font-size: 12px;
    }

    .empty-state-icon {
      font-size: 28px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-icon">📖</div>
      <div>
        <h1>EPUB Reader</h1>
        <p>精美电子书阅读器</p>
      </div>
    </div>

    <div class="action-buttons">
      <button class="action-btn primary" id="open-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="12" y1="18" x2="12" y2="12"/>
          <line x1="9" y1="15" x2="15" y2="15"/>
        </svg>
        打开文件
      </button>
      <button class="action-btn secondary" id="home-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        书架管理
      </button>
    </div>

    <input type="file" id="file-input" accept=".epub">

    <div class="divider"></div>

    <div class="recent-section">
      <h2>最近阅读</h2>
      <div class="recent-list" id="recent-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">📚</div>
          <div>暂无阅读记录</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../utils/db-gateway.js"></script>
  <script src="../utils/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
