<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>EPUB Reader</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="../styles/themes.css">
  <link rel="stylesheet" href="reader.css">
</head>
<body>
  <!-- Welcome Screen (shown when no book is loaded) -->
  <div class="welcome-screen" id="welcome-screen">
    <div class="welcome-content">
      <div class="welcome-icon">📖</div>
      <h1 class="welcome-title">EPUB Reader</h1>
      <p class="welcome-subtitle">精美电子书阅读体验</p>
      <button class="welcome-open-btn" id="welcome-open-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        打开 EPUB 文件
      </button>
      <p class="welcome-hint">支持拖拽文件到窗口打开</p>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay" style="display:none;">
    <div class="loading-spinner"></div>
    <p class="loading-text">正在加载书籍...</p>
  </div>

  <!-- Top Toolbar -->
  <header class="toolbar" id="toolbar">
    <div class="toolbar-left">
      <button class="toolbar-btn" id="btn-toc" title="目录 (T)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-search" title="搜索 (F)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="toolbar-book-info">
        <span class="book-title" id="book-title">EPUB Reader</span>
        <span class="chapter-title" id="chapter-title"></span>
      </div>
    </div>
    <div class="toolbar-right">
      <button class="toolbar-btn" id="btn-home" title="书架主页 (H)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-bookmark" title="添加书签 (B)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-bookmarks" title="书签列表">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-open" title="打开文件 (O)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </button>
      <button class="toolbar-btn" id="btn-settings" title="设置 (S)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- Table of Contents Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>目录</h2>
      <button class="sidebar-close" id="btn-toc-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sidebar-content" id="toc-container"></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-header">
      <h2>阅读设置</h2>
      <button class="sidebar-close" id="btn-settings-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-content">
      <!-- Theme -->
      <div class="settings-group">
        <label class="settings-label">主题</label>
        <div class="theme-switcher">
          <button class="theme-btn active" data-theme="light" title="亮色">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </button>
          <button class="theme-btn" data-theme="dark" title="暗色">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="theme-btn" data-theme="sepia" title="仿纸">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </button>
          <button class="theme-btn" data-theme="green" title="护眼">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <button class="theme-btn" data-theme="custom" title="自定义颜色">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/><circle cx="6.5" cy="12.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h3.016C21.606 16.394 24 13.593 24 10.51 24 5.8 18.627 2 12 2z"/></svg>
          </button>
        </div>
        <div id="custom-theme-options" class="custom-theme-options" style="display: none;">
          <div class="custom-color-row">
            <label class="custom-color-label">背景颜色</label>
            <input type="color" id="custom-bg-color" class="custom-color-input" value="#ffffff">
          </div>
          <div class="custom-color-row" style="margin-bottom: 0;">
            <label class="custom-color-label">文字颜色</label>
            <input type="color" id="custom-text-color" class="custom-color-input" value="#333333">
          </div>
        </div>
      </div>

      <!-- Font Size -->
      <div class="settings-group">
        <label class="settings-label">字号 <span id="font-size-value">18px</span></label>
        <div class="settings-slider-row">
          <span class="slider-label-sm">A</span>
          <input type="range" class="settings-slider" id="font-size-slider" min="12" max="32" value="18">
          <span class="slider-label-lg">A</span>
        </div>
      </div>

      <!-- Line Height -->
      <div class="settings-group">
        <label class="settings-label">行距 <span id="line-height-value">1.8</span></label>
        <div class="settings-slider-row">
          <span class="slider-label-sm">≡</span>
          <input type="range" class="settings-slider" id="line-height-slider" min="12" max="30" value="18" step="1">
          <span class="slider-label-lg">≡</span>
        </div>
      </div>

      <!-- Font Family -->
      <div class="settings-group">
        <label class="settings-label">字体</label>
        <select class="settings-select" id="font-family-select">
          <option value="">默认（跟随书籍）</option>
          <option value="'Noto Serif SC', 'Source Han Serif CN', serif">宋体 (Noto Serif)</option>
          <option value="'Noto Sans SC', 'Source Han Sans CN', sans-serif">黑体 (Noto Sans)</option>
          <option value="'LXGW WenKai', '楷体', KaiTi, serif">楷体 (LXGW WenKai)</option>
          <option value="serif">系统衬线体</option>
          <option value="sans-serif">系统无衬线体</option>
        </select>
      </div>

      <!-- Layout -->
      <div class="settings-group">
        <label class="settings-label">布局</label>
        <div class="layout-switcher">
          <button class="layout-btn active" data-layout="paginated" title="分页">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
            分页
          </button>
          <button class="layout-btn" data-layout="scrolled" title="滚动">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
            滚动
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bookmarks Panel -->
  <div class="bookmarks-panel" id="bookmarks-panel">
    <div class="settings-header">
      <h2>书签</h2>
      <button class="sidebar-close" id="btn-bookmarks-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="bookmarks-list" id="bookmarks-list"></div>
  </div>

  <!-- Search Panel -->
  <div class="bookmarks-panel" id="search-panel">
    <div class="settings-header">
      <h2>全文搜索</h2>
      <button class="sidebar-close" id="btn-search-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="search-input-container">
      <input type="text" id="search-input" class="search-input" placeholder="输入关键词 (Enter 搜索)">
      <button id="btn-do-search" class="search-submit-btn">搜索</button>
    </div>
    <div id="search-status" class="search-status-text"></div>
    <div class="bookmarks-list search-results-list" id="search-results-list"></div>
  </div>

  <!-- Main Reader Area -->
  <main class="reader-main" id="reader-main" style="display:none;">
    <!-- Navigation arrows -->
    <button class="nav-arrow nav-prev" id="btn-prev" title="上一页 (←)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-arrow nav-next" id="btn-next" title="下一页 (→)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- EPUB Render Area -->
    <div id="epub-viewer"></div>
  </main>

  <!-- Bottom Progress Bar -->
  <footer class="bottom-bar" id="bottom-bar" style="display:none;">
    <div class="progress-container">
      <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" value="0" step="0.1">
      <div class="progress-info">
        <span id="progress-time"></span>
        <span id="progress-location"></span>
        <span id="progress-current">0%</span>
      </div>
    </div>
  </footer>

  <!-- Image Viewer Overlay -->
  <div class="image-viewer-overlay" id="image-viewer" style="display:none;">
    <div class="image-viewer-close" id="image-viewer-close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </div>
    <div class="image-viewer-container" id="image-viewer-container">
      <img id="image-viewer-img" src="" alt="">
    </div>
    <div class="image-viewer-controls">
      <button class="image-viewer-btn" id="img-zoom-in" title="放大">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="image-viewer-btn" id="img-zoom-out" title="缩小">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <button class="image-viewer-btn" id="img-zoom-reset" title="重置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
    </div>
  </div>

  <!-- Annotation Popup -->
  <div class="annotation-overlay" id="annotation-overlay" style="display:none;"></div>
  <div class="annotation-popup" id="annotation-popup" style="display:none;">
    <div class="annotation-popup-header">
      <span class="annotation-popup-title" id="annotation-title">注释</span>
      <button class="annotation-popup-close" id="annotation-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="annotation-popup-body" id="annotation-body"></div>
  </div>


  <!-- Drag Overlay -->
  <div class="drag-overlay hidden" id="drag-overlay">
    <div class="drag-overlay-content">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <p>释放以打开 EPUB 文件</p>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept=".epub" style="display:none;">

  <!-- Selection Toolbar -->
  <div id="selection-toolbar" class="selection-toolbar">
    <button class="color-btn" data-color="#ffeb3b" style="background-color:#ffeb3b;" title="黄色"></button>
    <button class="color-btn" data-color="#a5d6a7" style="background-color:#a5d6a7;" title="绿色"></button>
    <button class="color-btn" data-color="#90caf9" style="background-color:#90caf9;" title="蓝色"></button>
    <button class="color-btn" data-color="#ef9a9a" style="background-color:#ef9a9a;" title="红色"></button>
    <div class="toolbar-divider"></div>
    <button class="action-btn-mini" id="btn-add-note" title="添加笔记">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
    <button class="action-btn-mini" id="btn-clear-hl" title="删除标注">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"/></svg>
    </button>
  </div>

  <!-- Note Input Popup -->
  <div id="note-popup" class="note-popup">
    <textarea id="note-textarea" placeholder="写下你的想法..."></textarea>
    <div class="note-actions">
      <button id="btn-show-toolbar" class="text-btn" style="margin-right: auto; padding-left: 0;">修改标注</button>
      <button id="btn-cancel-note" class="text-btn">取消</button>
      <button id="btn-save-note" class="primary-btn-mini">保存</button>
    </div>
  </div>

  <script src="../lib/jszip.min.js"></script>
  <script src="../lib/epub.min.js"></script>
  <script src="../utils/db-gateway.js?v=8"></script>
  <script src="../utils/utils.js?v=8"></script>
  <script src="../utils/storage.js?v=8"></script>
  <script src="image-viewer.js?v=8"></script>
  <script src="annotations.js?v=8"></script>
  <script src="toc.js?v=8"></script>
  <script src="search.js?v=8"></script>
  <script src="bookmarks.js?v=8"></script>
  <script src="highlights.js?v=8"></script>
  <script src="reader.js?v=8"></script>
</body>
</html>
